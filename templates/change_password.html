<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changer le mot de passe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
.box {
    background: #1e293b;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
h1 { text-align: center; color: #e2e8f0; font-size: 16px; margin-bottom: 24px; }
label { display: block; color: #94a3b8; font-size: 12px; margin-bottom: 6px; margin-top: 14px; }
input[type="password"] {
    width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155;
    background: #0f172a; color: #e2e8f0; font-size: 15px;
}
input:focus { outline: none; border-color: #2563eb; }
button {
    width: 100%; padding: 14px; margin-top: 22px; background: #2563eb; color: white;
    border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer;
}
button:hover { background: #1d4ed8; }
.error { background: #450a0a; color: #fca5a5; border-radius: 6px; padding: 10px; font-size: 13px; margin-top: 16px; text-align: center; }
.success { background: #052e16; color: #86efac; border-radius: 6px; padding: 10px; font-size: 13px; margin-top: 16px; text-align: center; }
.back { display: block; text-align: center; color: #64748b; font-size: 13px; margin-top: 20px; text-decoration: none; }
</style>
</head>
<body>
<div class="box">
    <div class="logo">🔑</div>
    <h1>Changer le mot de passe</h1>
    <form method="POST">
        <label>Mot de passe actuel</label>
        <input type="password" name="current_password" autocomplete="current-password" required>
        <label>Nouveau mot de passe</label>
        <input type="password" name="new_password" autocomplete="new-password" required>
        <label>Confirmer le nouveau mot de passe</label>
        <input type="password" name="confirm_password" autocomplete="new-password" required>
        <button type="submit">Mettre à jour</button>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">{{ success }}</div>{% endif %}
    </form>
    <a href="/" class="back">← Retour au dashboard</a>
</div>
</body>
</html>
